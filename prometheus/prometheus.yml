global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: open-monitoring

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Authenticated helper open-monitoring-auth (private repo).
  # Direct scrape on :9000/metrics — controller_up, devices, aps, gateway.
  # Prometheus and helper run on the same VM; backend reads via PromQL same as the others.
  - job_name: 'unifi_helper'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9000']
        labels:
          instance: 'unifi-controller'
          source: 'unifi-helper'

  - job_name: 'blackbox_http_sites'
    metrics_path: /probe
    params:
      module: [http_2xx_with_ssl]
    static_configs:
      - targets:
        - https://chat.jerb.net
        - https://pharmaervas.com.br
        - https://www.pharmaervas.com.br
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: 'blackbox_icmp_workers'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
        - 192.168.88.54
        - 192.168.88.55
        - 192.168.88.56
        - 192.168.88.57
        - 192.168.88.58
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: 'blackbox_kubelet_healthz'
    metrics_path: /probe
    params:
      module: [kubelet_healthz]
    static_configs:
      - targets:
        - 'https://192.168.88.51:10250/healthz'  # master-1
        - 'https://192.168.88.52:10250/healthz'  # master-2
        - 'https://192.168.88.53:10250/healthz'  # master-3
        - 'https://192.168.88.54:10250/healthz'  # worker-1
        - 'https://192.168.88.55:10250/healthz'  # worker-2
        - 'https://192.168.88.56:10250/healthz'  # worker-3
        - 'https://192.168.88.57:10250/healthz'  # worker-4
        - 'https://192.168.88.58:10250/healthz'  # worker-5
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: 'blackbox_http_proxmox'
    metrics_path: /probe
    params:
      module: [http_2xx_no_ssl_verify]
    static_configs:
      - targets:
        - 'https://192.168.88.40:8006/api2/json/version'  # pve0 API
        - 'https://192.168.88.41:8006/api2/json/version'  # pve1 API
        - 'https://192.168.88.42:8006/api2/json/version'  # pve2 API
        - 'https://192.168.88.43:8006/api2/json/version'  # pve3 API
        - 'https://192.168.88.44:8006/api2/json/version'  # pve4 API
        - 'https://192.168.88.45:8007/api2/json/version'  # pbs API
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
