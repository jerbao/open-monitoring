apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: status-app
  namespace: monitoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: status-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
    # Scales when mean CPU exceeds 60%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    # Scale up fast (DDoS may hit hard all at once)
    scaleUp:
      stabilizationWindowSeconds: 20
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    # Scale down slowly (avoid flapping when traffic normalizes)
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
