apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-app
  namespace: monitoring
  labels:
    app: status-app
spec:
  revisionHistoryLimit: 5
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime rollout
  selector:
    matchLabels:
      app: status-app
  template:
    metadata:
      labels:
        app: status-app
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: app
          # image is overridden by kustomize (ghcr.io/jerbao/open-monitoring-backend@sha256:...)
          image: ghcr.io/jerbao/open-monitoring-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # Prometheus is OUTSIDE the cluster (runs on VM .62), so we use the LAN IP.
            # Keep 192.168.88.62 or override via kustomize.
            - name: PROMETHEUS_URL
              value: http://192.168.88.62:9090
            - name: STATIC_DIR
              value: /app/static
          resources:
            # 160 MiB idle. 2 vCPU + 200Mi are sufficient with headroom.
            requests:
              cpu: 700m
              memory: 160Mi
            limits:
              cpu: 2
              memory: 200Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: probes
              mountPath: /app/probes.yaml
              subPath: probes.yaml
              readOnly: true
            - name: html
              mountPath: /app/static
              readOnly: true
      volumes:
        - name: probes
          configMap:
            name: open-monitoring-probes
        - name: html
          configMap:
            # name includes hash generated by configMapGenerator; kustomize
            # updates automatically when html/ changes
            name: open-monitoring-html

