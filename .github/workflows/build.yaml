name: build-images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'html/**'
      - 'k8s/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  checkup-format:
    name: Ruff format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ruff format --check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app/backend \
            ghcr.io/astral-sh/uv:python3.14-trixie-slim \
            sh -c "uv sync --locked --all-extras && uv run ruff format --check"

  type-check:
    name: Basedpyright type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run basedpyright
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app/backend \
            ghcr.io/astral-sh/uv:python3.14-trixie-slim \
            sh -c "uv sync --locked --all-extras && uv run basedpyright --project pyproject.toml"

  backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: [checkup-format, type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/jerbao/open-monitoring-backend:latest
            ghcr.io/jerbao/open-monitoring-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
